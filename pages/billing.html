<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upgrade Your Plan — Pillar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../src/styles/tokens.css" />
    <link rel="stylesheet" href="../src/styles/billing.css" />
  </head>
  <body>

    <!-- Minimal topbar with back button -->
    <div class="billing-topbar">
      <button type="button" class="back-btn" id="backBtn" aria-label="Go back to dashboard">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="19" y1="12" x2="5" y2="12"/>
          <polyline points="12 19 5 12 12 5"/>
        </svg>
        Back to Dashboard
      </button>

      <a href="../pages/dashboard.html" class="billing-logo" aria-label="Pillar home">
        <img src="/icon/logo.png" alt="Pillar Logo" width="22px" height="22px" />
        <span>Pillar</span>
      </a>
    </div>

    <!-- MAIN CONTENT -->
    <main class="billing-main">

      <!-- Header -->
      <div class="billing-header">
        <h1 class="billing-title">Upgrade Your Plan</h1>
        <p class="billing-sub">Unlock unlimited sessions, AI Tutor, and full mock exam access.</p>

        <!-- Billing toggle -->
        <div class="billing-toggle" role="group" aria-label="Billing period">
          <button type="button" class="toggle-btn toggle-btn--active" id="toggleMonthly" aria-pressed="true">Monthly</button>
          <button type="button" class="toggle-btn" id="toggleYearly" aria-pressed="false">
            Yearly
            <span class="save-badge">SAVE 20%</span>
          </button>
        </div>
      </div>

      <!-- Plans grid -->
      <div class="billing-plans-grid" id="plansGrid">
        <!-- Skeleton while loading -->
        <div class="billing-plan-card skeleton-card" aria-hidden="true">
          <div class="skeleton sk-w-50" style="height:16px;margin-bottom:8px;"></div>
          <div class="skeleton sk-w-30" style="height:12px;margin-bottom:16px;"></div>
          <div class="skeleton sk-w-70" style="height:40px;margin-bottom:20px;"></div>
          <div class="skeleton sk-w-100" style="height:12px;margin-bottom:6px;"></div>
          <div class="skeleton sk-w-100" style="height:12px;margin-bottom:6px;"></div>
          <div class="skeleton sk-w-70"  style="height:12px;margin-bottom:24px;"></div>
          <div class="skeleton sk-w-100" style="height:46px;border-radius:8px;"></div>
        </div>
        <div class="billing-plan-card skeleton-card" aria-hidden="true">
          <div class="skeleton sk-w-50" style="height:16px;margin-bottom:8px;"></div>
          <div class="skeleton sk-w-30" style="height:12px;margin-bottom:16px;"></div>
          <div class="skeleton sk-w-70" style="height:40px;margin-bottom:20px;"></div>
          <div class="skeleton sk-w-100" style="height:12px;margin-bottom:6px;"></div>
          <div class="skeleton sk-w-100" style="height:12px;margin-bottom:6px;"></div>
          <div class="skeleton sk-w-70"  style="height:12px;margin-bottom:24px;"></div>
          <div class="skeleton sk-w-100" style="height:46px;border-radius:8px;"></div>
        </div>
      </div>

      <!-- Current plan notice -->
      <p class="current-plan-note" id="currentPlanNote"></p>

      <!-- Security note -->
      <div class="security-note">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        Payments are secured by Paystack. Cancel anytime.
      </div>

    </main>

    <div class="toast" id="toast" role="alert" aria-live="polite"></div>

    <script type="module" src="../src/scripts/billing.js"></script>
  </body>
</html>
