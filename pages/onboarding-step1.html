<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Select Subjects – Pillar</title>

    <!-- Phosphor Icons CDN -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Google Fonts: Sora + Inter (matches tokens.css) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Global design tokens and base reset -->
    <link rel="stylesheet" href="../src/styles/tokens.css" />
    <link rel="stylesheet" href="../src/styles/base.css" />

    <!-- Page-specific styles -->
    <link rel="stylesheet" href="../src/styles/onboarding-step1.css" />
  </head>

  <body>

    <!-- ===================== FIXED HEADER ===================== -->
    <header class="site-header">
      <div class="header-container">

        <!-- Logo -->
        <a href="../index.html" class="logo-link" aria-label="Go to Pillar home">
          <img src="../public/icon/logo.png" alt="Pillar logo" class="logo-img" />
        </a>

        <!-- Step progress: Step 1 of 3 + three progress bars -->
        <nav class="steps-container" aria-label="Onboarding progress">
          <span class="steps-label">Step <strong id="current-step">1</strong> of <strong>3</strong></span>
          <ol class="steps-bars" role="list">
            <!-- Each bar represents one step; JS will add .active / .done classes -->
            <li class="step-bar active" aria-label="Step 1 active"></li>
            <li class="step-bar" aria-label="Step 2"></li>
            <li class="step-bar" aria-label="Step 3"></li>
          </ol>
        </nav>

      </div>
    </header>
    <!-- =================== END FIXED HEADER =================== -->


    <!-- ===================== MAIN CONTENT ===================== -->
    <main class="main-content">

      <!-- Page title + subtitle -->
      <section class="page-intro" aria-labelledby="page-title">
        <h1 id="page-title" class="page-title">Select your UTME subjects</h1>
        <p class="page-subtitle">
          You need 4 subjects to build your personalized study plan.
          <strong class="highlight-text">Use of English</strong> is already selected for you!
        </p>
      </section>


      <!-- Subject count tracker + progress bar -->
      <section class="selection-tracker" aria-live="polite" aria-label="Subject selection progress">

        <div class="tracker-top">
          <!-- Dynamic count e.g. "1/4 Subjects Selected" -->
          <p class="tracker-count">
            <strong id="selected-count">1</strong>/4
            <span class="tracker-count-label">Subjects Selected</span>
          </p>
          <!-- Dynamic remaining badge e.g. "Remaining 3" -->
          <span class="remaining-badge" id="remaining-badge">Remaining 3</span>
        </div>

        <!-- Progress bar fills in quarters as subjects are selected -->
        <div class="progress-bar-track" role="progressbar" aria-valuenow="1" aria-valuemin="0" aria-valuemax="4" aria-label="Subjects selected progress">
          <div class="progress-bar-fill" id="progress-bar-fill"></div>
        </div>

      </section>


      <!-- Subject cards grid — rendered dynamically by JS -->
      <section class="subjects-section" aria-labelledby="subjects-heading">
        <h2 id="subjects-heading" class="visually-hidden">Available Subjects</h2>

        <!-- Cards are injected here by subject-selection.js -->
        <div class="subject-cards-container" id="subject-cards-container" role="list">
          <!-- Dynamic cards go here -->
        </div>

      </section>


      <!-- Navigation buttons -->
      <section class="nav-buttons" aria-label="Page navigation">
        <button class="btn-next" id="btn-next" disabled>Next</button>
        <a href="register.html" class="btn-go-back">Go back</a>
      </section>

    </main>
    <!-- =================== END MAIN CONTENT =================== -->


    <!-- Page script -->
    <script type="module" src="../src/scripts/onboarding-step1.js"></script>

  </body>
</html>
